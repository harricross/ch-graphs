name: Lint Auto-fix

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ruff-fix:
    name: ruff fix
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      FIX_BRANCH: lint/auto-fix
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff auto-fix
        run: |
          ruff check --fix .
          ruff format .

      - name: Commit and push fixes
        id: push
        run: |
          if git diff --quiet; then
            echo "No lint fixes needed."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$FIX_BRANCH"
          git add -A
          git commit -m "fix: apply ruff auto-fixes"
          git push --force origin "$FIX_BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open or update PR via GH CLI
        if: steps.push.outputs.changed == 'true'
        run: |
          PR_BODY="Automated lint fixes applied by the **Lint Auto-fix** workflow.

          Changes were produced by:
          \`\`\`
          ruff check --fix .
          ruff format .
          \`\`\`"

          if gh pr view "$FIX_BRANCH" --json number -q .number > /dev/null 2>&1; then
            echo "PR already exists — new commit pushed to $FIX_BRANCH."
          else
            gh pr create \
              --head "$FIX_BRANCH" \
              --base main \
              --title "fix: apply ruff auto-fixes" \
              --body "$PR_BODY" \
              --label lint
          fi
